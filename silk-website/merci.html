<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merci - Silk Paris</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #0a0a0a; }
        .merci-box { text-align: center; padding: 60px 40px; }
        .merci-box h1 { font-family: 'Cormorant Garamond', serif; color: #C5A059; font-size: 3rem; margin-bottom: 20px; }
        .merci-box p { color: #ccc; font-family: 'Lato', sans-serif; font-size: 1.1rem; margin-bottom: 10px; }
        .merci-box a { display: inline-block; margin-top: 30px; color: #C5A059; font-family: 'Lato', sans-serif; text-decoration: none; border: 1px solid #C5A059; padding: 12px 30px; letter-spacing: 2px; font-size: 0.8rem; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="merci-box">
        <h1>Merci</h1>
        <p>Votre demande de réservation a bien été reçue.</p>
        <p>Une confirmation vous sera envoyée très rapidement.</p>
        <a href="https://www.silk.paris">← Retour au site</a>
    </div>
</body>
</html>
